<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>多语种小组 · 使用情况大屏</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1e;
            font-family: 'Inter', 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            padding: 24px 32px;
            color: #eef2ff;
            min-height: 100vh;
        }

        .dashboard {
            max-width: 1600px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title-section h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #FFFFFF 0%, #A5B4FC 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title-section p {
            font-size: 14px;
            color: #8b92b0;
            margin-top: 6px;
        }
        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .day-selector {
            background: #111827;
            border: 1px solid #2d374b;
            border-radius: 20px;
            padding: 6px 16px;
            color: #cbd5ff;
            font-size: 13px;
            cursor: pointer;
            outline: none;
        }
        .day-selector option {
            background: #111827;
        }
        .refresh-btn {
            background: #2d374b;
            border: 1px solid #3d4f6f;
            border-radius: 20px;
            padding: 6px 18px;
            color: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: #4f619b;
        }
        .auto-refresh-label {
            font-size: 11px;
            color: #6a73a0;
        }

        .main-grid {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .left-panel {
            flex: 0 0 280px;
            background: rgba(18, 24, 38, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            border: 1px solid rgba(72, 85, 131, 0.4);
            padding: 20px 16px;
            height: fit-content;
        }

        .group-section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(72, 85, 131, 0.3);
        }
        .section-title {
            font-size: 14px;
            font-weight: 500;
            color: #8f9bb5;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .group-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .group-item {
            background: #111827;
            border: 1px solid #2d374b;
            border-radius: 16px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .group-item:hover {
            background: #1f2a44;
            transform: translateX(4px);
        }
        .group-item.active {
            background: #2e3a6e;
            border-color: #6d8aff;
            box-shadow: 0 2px 8px rgba(109, 138, 255, 0.2);
        }
        .group-name {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .group-total {
            font-size: 12px;
            color: #a5b4fc;
            background: #00000040;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .group-preview {
            font-size: 11px;
            color: #8f9bb5;
            margin-top: 6px;
        }

        .members-section {
            margin-top: 8px;
        }
        .members-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .back-group-btn {
            background: #2d374b;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }
        .back-group-btn:hover {
            background: #4f619b;
        }
        .member-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 500px;
            overflow-y: auto;
        }
        .member-item {
            background: #111827;
            border: 1px solid #2d374b;
            border-radius: 40px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .member-item:hover {
            background: #1f2a44;
            transform: translateX(4px);
        }
        .member-item.active {
            background: #2e3a6e;
            border-color: #6d8aff;
        }
        .member-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(145deg, #2e3a5a, #1f2a44);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 13px;
            flex-shrink: 0;
        }
        .member-info {
            flex: 1;
            min-width: 0;
        }
        .member-name {
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .member-stats {
            font-size: 10px;
            color: #8f9bb5;
        }
        .no-data-tip {
            text-align: center;
            color: #6a73a0;
            padding: 30px 0;
            font-size: 13px;
        }

        .chart-card {
            flex: 1;
            background: rgba(18, 24, 38, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            border: 1px solid rgba(72, 85, 131, 0.4);
            padding: 24px 20px 20px 20px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .current-view-info {
            background: #0f1625;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            border-left: 4px solid #6d8aff;
        }
        .legend-note {
            font-size: 12px;
            background: #00000040;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .chart-container {
            width: 100%;
            height: 400px;
        }
        .summary-footer {
            margin-top: 20px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            border-top: 1px solid #2d354f;
            padding-top: 18px;
        }
        .kpi {
            background: #0f1422;
            padding: 6px 16px;
            border-radius: 28px;
        }
        .kpi span:first-child {
            color: #8f9bb5;
        }
        .kpi span:last-child {
            font-weight: 700;
            font-size: 20px;
            margin-left: 8px;
            color: #d9e2ff;
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,15,30,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: #a5b4fc;
            font-size: 18px;
        }
        .loading-overlay.hidden { display: none; }

        @media (max-width: 800px) {
            body { padding: 16px; }
            .left-panel { flex: 0 0 100%; }
            .header { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="header">
        <div class="title-section">
            <h1>多语种小组 · 功能使用态势大屏</h1>
            <p>点击小组查看汇总曲线 → 点击成员下钻个人详情（含0次点位）</p>
        </div>
        <div class="header-right">
            <select class="day-selector" id="daySelector">
                <option value="7">近 7 天</option>
                <option value="10" selected>近 10 天</option>
                <option value="14">近 14 天</option>
                <option value="30">近 30 天</option>
            </select>
            <button class="refresh-btn" id="refreshBtn">刷新数据</button>
            <span class="auto-refresh-label" id="autoRefreshLabel"></span>
        </div>
    </div>

    <div class="main-grid">
        <div class="left-panel">
            <div class="group-section">
                <div class="section-title">语种小组</div>
                <div class="group-list" id="groupList"></div>
            </div>

            <div class="members-section" id="membersSection">
                <div class="members-header">
                    <div class="section-title">小组成员</div>
                    <button class="back-group-btn" id="backToGroupBtn" style="display: none;">返回小组</button>
                </div>
                <div id="memberList" class="member-list">
                    <div class="no-data-tip">请先选择小组</div>
                </div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <div class="current-view-info" id="viewLabel">加载中...</div>
                <span class="legend-note">纵轴从0开始 · 零值显示空心圆点</span>
            </div>
            <div id="trendChart" class="chart-container"></div>
            <div class="summary-footer">
                <div class="kpi"><span>统计周期</span><span id="dateRange">--</span></div>
                <div class="kpi"><span>总使用次数</span><span id="totalUsage">--</span></div>
                <div class="kpi"><span>日均次数</span><span id="avgUsage">--</span></div>
                <div class="kpi"><span id="zeroLabel">零使用天数</span><span id="zeroDaysCount">--</span></div>
            </div>
        </div>
    </div>
</div>

<div class="loading-overlay hidden" id="loadingOverlay">加载中...</div>

<script>
    const API_BASE = '/api/public/dashboard';

    let GROUPS = {};
    let DATE_LABELS = [];
    let currentDays = 10;
    let currentGroup = null;
    let currentMember = null;
    let chart = null;
    let autoRefreshTimer = null;

    function computeStats(dataArray) {
        const total = dataArray.reduce((a, b) => a + b, 0);
        const avg = (total / dataArray.length).toFixed(1);
        const zeroCount = dataArray.filter(v => v === 0).length;
        return { total, avg, zeroCount };
    }

    function getGroupTotal(groupName) {
        const members = GROUPS[groupName];
        if (!members) return 0;
        let total = 0;
        Object.values(members).forEach(m => {
            total += m.daily.reduce((a, b) => a + b, 0);
        });
        return total;
    }

    function getGroupDailyData(groupName) {
        const members = GROUPS[groupName];
        if (!members) return [];
        return DATE_LABELS.map((_, idx) => {
            return Object.values(members).reduce((sum, m) => sum + m.daily[idx], 0);
        });
    }

    function getCurrentData() {
        if (!currentGroup) return null;
        if (currentMember) {
            return GROUPS[currentGroup][currentMember].daily;
        }
        return getGroupDailyData(currentGroup);
    }

    function getCurrentTitle() {
        if (!currentGroup) return '未选择小组';
        if (currentMember) {
            const m = GROUPS[currentGroup][currentMember];
            return `${currentGroup} · ${m.name} (个人)`;
        }
        return `${currentGroup} · 小组汇总`;
    }

    function updateStatsPanel() {
        const data = getCurrentData();
        if (!data) {
            document.getElementById('totalUsage').innerText = '--';
            document.getElementById('avgUsage').innerText = '--';
            document.getElementById('zeroDaysCount').innerText = '--';
            return;
        }
        const stats = computeStats(data);
        document.getElementById('totalUsage').innerText = stats.total;
        document.getElementById('avgUsage').innerText = stats.avg;
        document.getElementById('zeroDaysCount').innerText = stats.zeroCount;

        const zeroLabelSpan = document.getElementById('zeroLabel');
        if (zeroLabelSpan) {
            zeroLabelSpan.innerText = currentMember ? '个人零使用天数' : '小组零日总数';
        }
        document.getElementById('dateRange').innerText = `近${DATE_LABELS.length}天`;
    }

    function renderChart() {
        if (!chart) return;
        const data = getCurrentData();
        if (!data) {
            chart.clear();
            return;
        }

        const title = getCurrentTitle();
        const option = {
            backgroundColor: 'transparent',
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(20,28,44,0.96)',
                borderColor: '#4f6fcf',
                borderWidth: 1,
                textStyle: { color: '#f0f3ff' },
                formatter: function(params) {
                    if (!params || !params[0]) return '';
                    const val = params[0].value;
                    const date = params[0].axisValue;
                    return '<strong>' + title + '</strong><br/>日期: ' + date + '<br/>使用次数: <b>' + val + '</b> 次<br/>' + (val === 0 ? '当日无使用记录（零点已标注）' : '功能活跃');
                }
            },
            grid: { left: '8%', right: '5%', top: 20, bottom: 30, containLabel: true },
            xAxis: {
                type: 'category',
                data: DATE_LABELS,
                axisLine: { lineStyle: { color: '#6b7c9e' } },
                axisLabel: { color: '#b9c7e0', fontSize: 11, rotate: 0 },
                name: '日期',
                nameLocation: 'middle',
                nameGap: 35,
                nameTextStyle: { color: '#9aa9c7' }
            },
            yAxis: {
                type: 'value',
                name: '使用次数 (次)',
                nameTextStyle: { color: '#9aa9c7' },
                splitLine: { lineStyle: { color: '#25304a', type: 'dashed' } },
                axisLabel: { color: '#cbd5ff' },
                min: 0,
                minInterval: 1
            },
            series: [{
                name: '使用次数',
                type: 'line',
                data: data,
                smooth: false,
                symbol: 'circle',
                symbolSize: 8,
                lineStyle: { width: 3, color: '#6d8aff', shadowBlur: 8, shadowColor: '#6d8aff80' },
                itemStyle: {
                    color: function(params) { return params.value === 0 ? '#ffaa66' : '#ffcf4a'; },
                    borderColor: function(params) { return params.value === 0 ? '#ffaa66' : '#ffffff'; },
                    borderWidth: 2,
                },
                areaStyle: {
                    opacity: 0.15,
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#6d8aff' }, { offset: 1, color: '#2e3b6e' }
                    ])
                }
            }]
        };
        chart.setOption(option, true);
    }

    function renderGroupList() {
        const container = document.getElementById('groupList');
        container.innerHTML = '';
        const groupNames = Object.keys(GROUPS);

        if (groupNames.length === 0) {
            container.innerHTML = '<div class="no-data-tip">暂无小组数据</div>';
            return;
        }

        const groupOrder = ['韩语组', '日语组', '英语组', '亚太组'];
        const ordered = groupOrder.filter(g => groupNames.includes(g));
        groupNames.forEach(g => { if (!ordered.includes(g)) ordered.push(g); });

        ordered.forEach(groupName => {
            const total = getGroupTotal(groupName);
            const memberCount = Object.keys(GROUPS[groupName]).length;
            const isActive = (currentGroup === groupName && !currentMember);
            const item = document.createElement('div');
            item.className = 'group-item' + (isActive ? ' active' : '');
            item.innerHTML =
                '<div class="group-name">' +
                    groupName +
                    '<span class="group-total">' + total + '次 / ' + memberCount + '人</span>' +
                '</div>' +
                '<div class="group-preview">点击查看小组汇总曲线</div>';
            item.addEventListener('click', function() {
                currentGroup = groupName;
                currentMember = null;
                refreshUI();
            });
            container.appendChild(item);
        });
    }

    function renderMemberList() {
        const container = document.getElementById('memberList');
        const backBtn = document.getElementById('backToGroupBtn');

        if (!currentGroup || !GROUPS[currentGroup]) {
            container.innerHTML = '<div class="no-data-tip">请先选择小组</div>';
            backBtn.style.display = 'none';
            return;
        }

        const members = GROUPS[currentGroup];
        const memberKeys = Object.keys(members);

        if (memberKeys.length === 0) {
            container.innerHTML = '<div class="no-data-tip">暂无成员数据</div>';
            backBtn.style.display = 'inline-block';
            return;
        }

        backBtn.style.display = 'inline-block';
        container.innerHTML = '';

        memberKeys.forEach(username => {
            const m = members[username];
            const stats = computeStats(m.daily);
            const isActive = (currentMember === username);
            const item = document.createElement('div');
            item.className = 'member-item' + (isActive ? ' active' : '');
            item.innerHTML =
                '<div class="member-avatar">' + m.name.charAt(0) + '</div>' +
                '<div class="member-info">' +
                    '<div class="member-name">' + m.name + '</div>' +
                    '<div class="member-stats">总次数 ' + stats.total + ' · 零日 ' + stats.zeroCount + '天</div>' +
                '</div>';
            item.addEventListener('click', function() {
                currentMember = username;
                refreshUI();
            });
            container.appendChild(item);
        });
    }

    function refreshUI() {
        renderGroupList();
        renderMemberList();
        renderChart();
        updateStatsPanel();

        const viewLabel = document.getElementById('viewLabel');
        if (currentMember && currentGroup && GROUPS[currentGroup] && GROUPS[currentGroup][currentMember]) {
            viewLabel.innerText = currentGroup + ' · ' + GROUPS[currentGroup][currentMember].name + ' (个人详情)';
        } else if (currentGroup) {
            viewLabel.innerText = currentGroup + ' · 小组汇总曲线';
        } else {
            viewLabel.innerText = '请选择小组';
        }
    }

    function backToGroupSummary() {
        if (currentGroup) {
            currentMember = null;
            refreshUI();
        }
    }

    async function fetchData() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.remove('hidden');

        try {
            const resp = await fetch(API_BASE + '/data?days=' + currentDays);
            const json = await resp.json();

            if (json.success && json.data) {
                DATE_LABELS = json.data.date_labels;
                GROUPS = json.data.groups;

                const groupNames = Object.keys(GROUPS);
                if (!currentGroup || !GROUPS[currentGroup]) {
                    currentGroup = groupNames.length > 0 ? groupNames[0] : null;
                }
                if (currentMember && currentGroup && (!GROUPS[currentGroup] || !GROUPS[currentGroup][currentMember])) {
                    currentMember = null;
                }

                refreshUI();
            } else {
                document.getElementById('viewLabel').innerText = '数据加载失败';
            }
        } catch (err) {
            console.error('Dashboard data fetch error:', err);
            document.getElementById('viewLabel').innerText = '网络错误，请刷新重试';
        } finally {
            overlay.classList.add('hidden');
        }
    }

    function initChart() {
        const dom = document.getElementById('trendChart');
        if (!dom) return;
        chart = echarts.init(dom);
        window.addEventListener('resize', function() { if (chart) chart.resize(); });
    }

    function bindEvents() {
        document.getElementById('backToGroupBtn').addEventListener('click', backToGroupSummary);
        document.getElementById('refreshBtn').addEventListener('click', fetchData);
        document.getElementById('daySelector').addEventListener('change', function() {
            currentDays = parseInt(this.value, 10);
            fetchData();
        });
    }

    function startAutoRefresh() {
        if (autoRefreshTimer) clearInterval(autoRefreshTimer);
        autoRefreshTimer = setInterval(function() {
            fetchData();
        }, 5 * 60 * 1000);
        document.getElementById('autoRefreshLabel').innerText = '每5分钟自动刷新';
    }

    function init() {
        initChart();
        bindEvents();
        fetchData();
        startAutoRefresh();
    }

    init();
</script>
</body>
</html>
